# CI: run tests and checks on every push to main and on every PR.
# Branch protection can require this workflow to pass before merging.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [v2, v3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "${{ matrix.module }}/go.mod"

      - name: Tidy
        run: go -C ${{ matrix.module }} mod tidy

      - name: Build
        run: go build -C ${{ matrix.module }} ./...

      - name: Vet
        run: go vet -C ${{ matrix.module }} ./...

      - name: Test
        run: go test -C ${{ matrix.module }} -race ./...
