# Release: on tag push v*/v*.*.*, run tests, create GitHub Release, and attach
# SBOM + checksums so the package can be installed with go install and consumed safely.
#
# Tag format: v2/v1.0.0 or v3/v1.0.0
# The module (v2 or v3) is extracted from the tag to determine which package to release.

name: Release

on:
  push:
    tags:
      - "v*/v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract module from tag
        id: module
        run: |
          # Tag is like v2/v1.0.0 or v3/v1.0.0
          MODULE=$(echo "${{ github.ref_name }}" | cut -d'/' -f1)
          echo "name=$MODULE" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "${{ steps.module.outputs.name }}/go.mod"

      - name: Tidy
        run: go -C ${{ steps.module.outputs.name }} mod tidy

      - name: Build
        run: go build -C ${{ steps.module.outputs.name }} ./...

      - name: Vet
        run: go vet -C ${{ steps.module.outputs.name }} ./...

      - name: Test
        run: go test -C ${{ steps.module.outputs.name }} -race ./...

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract module from tag
        id: module
        run: |
          # Tag is like v2/v1.0.0 or v3/v1.0.0
          MODULE=$(echo "${{ github.ref_name }}" | cut -d'/' -f1)
          echo "name=$MODULE" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "${{ steps.module.outputs.name }}/go.mod"

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.15.2
        with:
          path: ./${{ steps.module.outputs.name }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0.15.2
        with:
          path: ./${{ steps.module.outputs.name }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Create checksums for SBOMs
        run: sha256sum sbom.cyclonedx.json sbom.spdx.json > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom.cyclonedx.json
            sbom.spdx.json
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
